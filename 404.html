<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página não encontrada — XIII Fórum Científico da EsEFEx</title>
  <link rel="icon" type="image/png" href="Logo esefex.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0e0c0a;
      color: #f0ebe4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 480px; }
    h1 {
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(3rem, 10vw, 5rem);
      font-weight: 700;
      background: linear-gradient(135deg, #ff6b1a, #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: .5rem;
    }
    p { color: #b0a090; font-size: 1rem; margin-bottom: 1.5rem; line-height: 1.6; }
    a {
      display: inline-block;
      padding: .75rem 2rem;
      background: linear-gradient(135deg, #ff6b1a, #f59e0b);
      color: #0e0c0a;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      text-decoration: none;
      border-radius: 8px;
      transition: transform .2s, box-shadow .2s;
    }
    a:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,107,26,.3); }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>A página que você procura não existe ou foi movida.<br>Que tal voltar ao início?</p>
    <a href="index.html">Voltar ao site</a>
  </div>
</body>
</html>
